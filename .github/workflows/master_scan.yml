name: EOD Master Market Scan
on:
  schedule:
    # Runs at 14:00 UTC (7:30 PM IST) and 02:30 UTC (8:00 AM IST)
    - cron: '0 14 * * 1-5'
    - cron: '30 2 * * 1-5'
  workflow_dispatch:

jobs:
  run-master-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Execute Master Scan
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ICICI_APP_KEY: ${{ secrets.ICICI_APP_KEY }}
          ICICI_SECRET_KEY: ${{ secrets.ICICI_SECRET_KEY }}
          ICICI_SESSION_TOKEN: ${{ secrets.ICICI_SESSION_TOKEN }}
        run: |
          python master_scan.py
