name: Titan Data Engine Update
on:
  schedule:
    - cron: '30 15 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v3
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Tools
        run: pip install yfinance pandas numpy pyarrow

      - name: Run Market Analysis
        run: python engine.py

      - name: Save Data to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add daily_analysis.csv
          # The next line ensures we don't fail if there are no changes
          git commit -m "Engine Update $(date)" || exit 0
          # We use a forced push to bypass standard branch protection if 'Allow Force Pushes' is enabled
          git push origin main --force
          
