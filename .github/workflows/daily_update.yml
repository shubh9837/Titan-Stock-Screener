name: Quantum-Sentinel Daily Run

on:
  schedule:
    - cron: '30 0 * * *' # 6:00 AM IST
  workflow_dispatch:

permissions:
  contents: write # CRITICAL: Allows the bot to save your Portfolio/History

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Changed from 3.9 to 3.10

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Engine
        run: python engine.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          
          # This version won't crash if a file is missing
          git add daily_analysis.csv || echo "Analysis file missing"
          git add tickers_enriched.csv || echo "Enriched file missing"
          git add portfolio.json || echo "Portfolio file missing"
          git add trade_history.csv || echo "History file missing"
          
          # Only push if there's actually something new to save
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Morning Update [Skip CI]" && git push)
