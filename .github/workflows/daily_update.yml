name: Quantum-Sentinel Daily Run

on:
  schedule:
    - cron: '30 0 * * *' # 6:00 AM IST
  workflow_dispatch:

permissions:
  contents: write # CRITICAL: Allows the bot to save your Portfolio/History

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Changed from 3.9 to 3.10

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Engine
        run: python engine.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add daily_analysis.csv tickers_enriched.csv portfolio.json trade_history.csv
          git commit -m "Automated Morning Update [Skip CI]" || echo "No changes to commit"
          git push
          
