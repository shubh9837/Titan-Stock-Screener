name: Titan Data Engine Update
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: pip install yfinance pandas numpy pyarrow

      - name: Run Market Analysis
        run: python engine.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_analysis.csv
          git commit -m "Auto-update: $(date)" || echo "No changes to commit"
          # This direct push works best when no protection rules exist
          git push
