name: One-Time Ticker Cleaner
on:
  workflow_dispatch: # Allows you to trigger it manually

jobs:
  clean-tickers:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants permission to save the new file
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance
      - name: Run Cleaner Script
        run: python clean_data.py
      - name: Commit & Push New Tickers.csv
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add Tickers.csv
          git commit -m "Auto-mapped sectors and cleaned invalid tickers" || echo "No changes to commit"
          git push
