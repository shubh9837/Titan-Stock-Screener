name: 15-Minute Market Update
on:
  schedule:
    - cron: '*/15 3-10 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # Upgraded to 3.11 for better library support
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas==2.0.3 PyGithub
          # Installing via Direct URL to bypass the "Distribution Not Found" error
          pip install https://github.com/twopirllc/pandas-ta/archive/master.zip

      - name: Run Math Engine
        run: python engine.py
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Commit & Push Results
        run: |
          git config --global user.name 'Market-Bot'
          git config --global user.email 'bot@market.com'
          git add daily_analysis.csv
          git commit -m "Automated Market Update: $(date)" || echo "No changes to commit"
          git push
          
