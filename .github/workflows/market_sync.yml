name: 15-Minute Market Update
on:
  schedule:
    - cron: '*/15 3-10 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy==1.26.4 
          pip install pandas==2.0.3 yfinance==0.2.37 PyGithub ta
          
