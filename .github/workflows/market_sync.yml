name: 15-Minute Market Update
on:
  schedule:
    - cron: '*/15 3-10 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Upgraded to v4 to fix the Node.js warning in your logs

      - name: Setup Python
        uses: actions/setup-python@v5 # Upgraded to v5 for better stability
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas==2.0.3 PyGithub
          # Using the verified PyPI source link to avoid 404 errors
          pip install "pandas-ta @ https://github.com/twopirllc/pandas-ta/archive/refs/heads/main.zip"

      - name: Run Math Engine
        run: python engine.py
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Commit & Push Results
        run: |
          git config --global user.name 'Market-Bot'
          git config --global user.email 'bot@market.com'
          git add daily_analysis.csv
          git commit -m "Automated Market Update: $(date)" || echo "No changes to commit"
          git push
          
