name: 15-Minute Intraday Pulse
on:
  schedule:
    # Runs every 15 mins between 03:45 and 10:00 UTC (09:15 AM to 3:30 PM IST) Mon-Fri
    - cron: '*/15 3-10 * * 1-5'
  workflow_dispatch:

jobs:
  run-market-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Caches dependencies to make the action run much faster
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Execute Intraday Scan & Sync to Cloud DB
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python engine.py intraday
