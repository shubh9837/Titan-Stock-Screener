name: Stealth Intraday Pulse (45m)

on:
  schedule:
    - cron: '45 3 * * 1-5'  # 1. 9:15 AM IST (Market Open / Gap-Down Check)
    - cron: '30 4 * * 1-5'  # 2. 10:00 AM IST (Morning Volatility Settled)
    - cron: '15 5 * * 1-5'  # 3. 10:45 AM IST
    - cron: '0 6 * * 1-5'   # 4. 11:30 AM IST
    - cron: '45 6 * * 1-5'  # 5. 12:15 PM IST (Mid-Day Check)
    - cron: '30 7 * * 1-5'  # 6. 1:00 PM IST 
    - cron: '15 8 * * 1-5'  # 7. 1:45 PM IST (Pre-Ignition Setup)
    - cron: '55 8 * * 1-5'  # 8. 2:25 PM IST (Post-Ignition Capture)
    - cron: '45 9 * * 1-5'  # 9. 3:15 PM IST (Pre-Close / Profit Lock)

  workflow_dispatch:

jobs:
  run-pulse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pandas-ta-classic yfinance supabase twilio
      - name: Execute Pulse
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_NUMBER: ${{ secrets.TWILIO_WHATSAPP_NUMBER }}
          MY_PHONE_NUMBER: ${{ secrets.MY_PHONE_NUMBER }}
        run: python intraday_pulse.py
