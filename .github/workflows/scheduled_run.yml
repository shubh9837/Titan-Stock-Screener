name: 15-Min Market Sync
on:
  schedule:
    # Runs every 15 mins, Mon-Fri, between 3:00 UTC and 11:00 UTC
    - cron: '*/15 3-11 * * 1-5'
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: pip install yfinance pandas pandas_ta PyGithub
        
      - name: Run Engine
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python engine.py
        
